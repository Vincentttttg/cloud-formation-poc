AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  BeED per-service stack (Option B - best-practice redesign). Deploy once PER
  SERVICE onto an existing platform stack. Provisions: target group, host-based
  listener rule on the shared ALB, task security group, per-service IAM roles,
  log group, Fargate task definition (config via SSM/Secrets Manager) and
  service in private subnets with target-tracking autoscaling. Adds zero
  fixed-cost infrastructure per service.

Parameters:
  PlatformStackName:
    Type: String
    Description: Name of the deployed platform stack to attach to (cross-stack imports)
  ServiceName:
    Type: String
    AllowedPattern: '[a-z][a-z0-9-]*'
    MaxLength: 20
    Description: Short service name, lowercase (e.g. hub-api)
  Environment:
    Type: String
    AllowedValues: [test, stage, prod]
    Description: Target environment (must match the platform stack's)
  HostHeader:
    Type: String
    Description: Host name routed to this service (e.g. hub-api-prod.beed.world)
  ListenerRulePriority:
    Type: Number
    MinValue: 1
    MaxValue: 50000
    Description: Unique priority for this service's rule on the shared listener
  ContainerPort:
    Type: Number
    Description: Port the container listens on
  ImageUri:
    Type: String
    Description: Full container image URI incl. tag
  Cpu:
    Type: String
    Default: '512'
    AllowedValues: ['256', '512', '1024', '2048', '4096']
  Memory:
    Type: String
    Default: '1024'
  MinTasks:
    Type: Number
    Default: 2
    Description: Autoscaling floor (2 = HA across both AZs; use 1 for cheap demo)
  MaxTasks:
    Type: Number
    Default: 4
    Description: Autoscaling ceiling
  CpuTargetPercent:
    Type: Number
    Default: 70
    Description: Target-tracking CPU utilisation percent
  HealthCheckPath:
    Type: String
    Default: /health
  SecretsManagerArn:
    Type: String
    Default: ''
    Description: >-
      Optional Secrets Manager secret ARN. When set, its value is injected as
      env var APP_CONFIG (replaces the S3 .env pattern - rotation + audit trail).
  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [7, 14, 30, 60, 90, 180, 365]

Conditions:
  HasSecret: !Not [!Equals [!Ref SecretsManagerArn, '']]

Resources:
  # ----- Routing on the shared ALB -----
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'beed-${ServiceName}-${Environment}-tg'
      VpcId: !ImportValue
        Fn::Sub: '${PlatformStackName}-VpcId'
      TargetType: ip
      Protocol: HTTP
      Port: !Ref ContainerPort
      HealthCheckProtocol: HTTP
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckPort: traffic-port
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 5
      UnhealthyThresholdCount: 2
      Matcher:
        HttpCode: '200'

  ListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !ImportValue
        Fn::Sub: '${PlatformStackName}-RulesListenerArn'
      Priority: !Ref ListenerRulePriority
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Ref HostHeader
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ----- Network isolation: only the shared ALB can reach the tasks -----
  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Tasks for ${ServiceName}-${Environment} - reachable only from shared ALB'
      GroupName: !Sub 'beed-${ServiceName}-${Environment}-task-sg'
      VpcId: !ImportValue
        Fn::Sub: '${PlatformStackName}-VpcId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !ImportValue
            Fn::Sub: '${PlatformStackName}-AlbSecurityGroupId'
          Description: Container port from shared ALB only

  # ----- Logging -----
  LogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub '/ecs/beed-${ServiceName}-${Environment}'
      RetentionInDays: !Ref LogRetentionDays

  # ----- Per-service IAM: execution (infra) vs task (app) split -----
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'beed-${ServiceName}-${Environment}-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies: !If
        - HasSecret
        - - PolicyName: read-own-secret
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: secretsmanager:GetSecretValue
                  Resource: !Ref SecretsManagerArn
        - !Ref AWS::NoValue

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'beed-${ServiceName}-${Environment}-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # ----- Task definition -----
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'beed-${ServiceName}-${Environment}'
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: !Sub '${ServiceName}-${Environment}'
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
              AppProtocol: http
          Secrets: !If
            - HasSecret
            - - Name: APP_CONFIG
                ValueFrom: !Ref SecretsManagerArn
            - !Ref AWS::NoValue
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # ----- Service: private subnets, no public IP, circuit breaker -----
  Service:
    Type: AWS::ECS::Service
    DependsOn: ListenerRule
    Properties:
      ServiceName: !Sub 'beed-${ServiceName}-${Environment}'
      Cluster: !ImportValue
        Fn::Sub: '${PlatformStackName}-ClusterName'
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      PlatformVersion: 1.4.0
      SchedulingStrategy: REPLICA
      DesiredCount: !Ref MinTasks
      HealthCheckGracePeriodSeconds: 30
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED   # tasks are unreachable from the internet; egress via NAT
          Subnets: !Split
            - ','
            - !ImportValue
              Fn::Sub: '${PlatformStackName}-PrivateSubnetIds'
          SecurityGroups:
            - !Ref TaskSecurityGroup
      LoadBalancers:
        - ContainerName: !Sub '${ServiceName}-${Environment}'
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup

  # ----- Autoscaling: target tracking on CPU -----
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ServiceNamespace: ecs
      ScalableDimension: ecs:service:DesiredCount
      ResourceId: !Sub
        - 'service/${ClusterName}/${Service.Name}'
        - ClusterName: !ImportValue
            Fn::Sub: '${PlatformStackName}-ClusterName'
      MinCapacity: !Ref MinTasks
      MaxCapacity: !Ref MaxTasks

  ScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub 'beed-${ServiceName}-${Environment}-cpu-target'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: !Ref CpuTargetPercent
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  ServiceHostName:
    Description: Create the external beed.world CNAME - this host -> the shared ALB DNS
    Value: !Ref HostHeader
  TargetGroupArn:
    Value: !Ref TargetGroup
  ServiceName:
    Value: !GetAtt Service.Name
  LogGroupName:
    Value: !Ref LogGroup
