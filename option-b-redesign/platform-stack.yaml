# Template format version (fixed date defined by AWS, not today's date).
AWSTemplateFormatVersion: '2010-09-09'

Description: >-
  BeED shared platform stack (Option B - best-practice redesign). Deploy ONCE per
  environment. Provisions: purpose-built VPC (public subnets for the ALB, private
  subnets for tasks, NAT), ONE shared internet-facing ALB with HTTP->HTTPS, and
  ONE shared ECS cluster. Service stacks attach to this via cross-stack exports;
  each new backend service then adds zero fixed-cost infrastructure.

# ---------------------------------------------------------------------------
# PARAMETERS = the blanks you fill in when deploying (see params/platform-demo.json).
# ---------------------------------------------------------------------------
Parameters:
  EnvironmentName:                      # which environment this shared platform serves
    Type: String
    AllowedValues: [test, stage, prod]
    Description: Environment this platform serves
  VpcCidr:                              # the private IP range for the whole VPC
    Type: String
    Default: 10.0.0.0/16                # /16 = ~65,000 addresses, split into subnets below
    Description: CIDR for the platform VPC
  CertificateArn:                       # the HTTPS certificate for the shared ALB (optional)
    Type: String
    Default: ''
    Description: >-
      Optional ACM certificate (e.g. *.beed.world wildcard). When set, HTTPS:443
      terminates TLS and HTTP:80 redirects; service listener rules attach to the
      HTTPS listener. When empty (demo mode), rules attach to HTTP:80.
  NatPerAz:                             # one NAT gateway per zone (HA) or a single shared one (cheaper)?
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      true = one NAT gateway per AZ (HA, ~2x NAT cost). false = single shared NAT
      (cheaper; an AZ outage of that AZ breaks outbound from the other).

# ---------------------------------------------------------------------------
# CONDITIONS = reusable true/false tests.
# ---------------------------------------------------------------------------
Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]   # true if a cert was supplied
  CreateSecondNat: !Equals [!Ref NatPerAz, 'true']           # true if we want a 2nd NAT gateway

Resources:
  # ----- VPC -----
  # A VPC is your own private, isolated network inside AWS.
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true            # let resources resolve DNS names
      EnableDnsHostnames: true          # give resources internal DNS names
      Tags:
        - Key: Name                     # a friendly label shown in the console
          Value: !Sub 'beed-${EnvironmentName}-vpc'

  # The internet gateway is the VPC's connection to the public internet.
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-igw'

  # Attaching the gateway actually plugs it into the VPC.
  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # PUBLIC subnets = have a route to the internet gateway. The ALB lives here.
  # !Cidr [range, count, bits] auto-slices the VPC range into smaller subnets so
  # you don't have to calculate IP ranges by hand. !Select [0, ...] picks the 1st.
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 4, 12]]  # 1st of 4 sub-ranges
      AvailabilityZone: !Select [0, !GetAZs '']            # 1st availability zone in this region
      MapPublicIpOnLaunch: true         # things launched here get a public IP
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-public-a'

  PublicSubnetB:                        # a 2nd public subnet in a 2nd zone (for redundancy)
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 4, 12]]  # 2nd sub-range
      AvailabilityZone: !Select [1, !GetAZs '']            # 2nd zone
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-public-b'

  # PRIVATE subnets = NO direct internet route. The tasks (containers) live here,
  # so nobody on the internet can reach them directly. This is the security win.
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 4, 12]]  # 3rd sub-range
      AvailabilityZone: !Select [0, !GetAZs '']            # same zone as PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-private-a'

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 4, 12]]  # 4th sub-range
      AvailabilityZone: !Select [1, !GetAZs '']            # same zone as PublicSubnetB
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-private-b'

  # A route table is a set of "to reach X, go via Y" rules for a subnet.
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-public-rt'

  # Rule for public subnets: "to reach anywhere (0.0.0.0/0), use the internet gateway."
  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment     # the gateway must be attached first
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0   # "any destination"
      GatewayId: !Ref InternetGateway

  # Attach the public route table to each public subnet.
  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # An Elastic IP is a fixed public IP address, needed by the NAT gateway.
  NatEipA:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc

  # A NAT gateway lets the PRIVATE tasks reach OUT to the internet (e.g. pull a
  # Docker image) while still blocking anyone from reaching IN to them.
  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEipA.AllocationId  # use the Elastic IP above
      SubnetId: !Ref PublicSubnetA      # a NAT gateway itself sits in a PUBLIC subnet
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-nat-a'

  # A second Elastic IP + NAT, created ONLY if NatPerAz=true (full HA).
  NatEipB:
    Type: AWS::EC2::EIP
    Condition: CreateSecondNat
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc

  NatGatewayB:
    Type: AWS::EC2::NatGateway
    Condition: CreateSecondNat
    Properties:
      AllocationId: !GetAtt NatEipB.AllocationId
      SubnetId: !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-nat-b'

  # Route table for private subnet A.
  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-private-rt-a'

  # Rule for private subnet A: "to reach the internet, go via NAT gateway A."
  PrivateDefaultRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  # Route table for private subnet B.
  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub 'beed-${EnvironmentName}-private-rt-b'

  # Rule for private subnet B: use NAT B if it exists, otherwise share NAT A.
  PrivateDefaultRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !If [CreateSecondNat, !Ref NatGatewayB, !Ref NatGatewayA]

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

  # ----- Shared ALB -----
  # One firewall for the single shared load balancer: open to the internet on 80/443.
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'Shared ALB for all beed-${EnvironmentName} services'
      GroupName: !Sub 'beed-${EnvironmentName}-shared-alb-sg'
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Public HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Public HTTPS

  # ONE load balancer shared by every service (instead of one per service).
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'beed-${EnvironmentName}-shared-alb'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:                          # the ALB spans both public subnets (2 zones)
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref AlbSecurityGroup

  # The shared listener's DEFAULT action returns 404. Each service will later add
  # its own rule ("if host = hub-api-prod.beed.world, send to hub-api's tasks").
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect              # with a cert: push everyone to HTTPS
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              Host: '#{host}'
              Path: '/#{path}'
              Query: '#{query}'
              StatusCode: HTTP_301
          - Type: fixed-response        # demo mode: reply 404 unless a service rule matches
            FixedResponseConfig:
              StatusCode: '404'
              ContentType: text/plain
              MessageBody: No service matches this host name.

  # HTTPS listener - only when a certificate was provided. Service rules attach here.
  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '404'
            ContentType: text/plain
            MessageBody: No service matches this host name.

  # ----- Shared cluster (one per environment, not one per service) -----
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'beed-${EnvironmentName}-cluster'
      CapacityProviders: [FARGATE]
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled                # turn on extra CPU/memory monitoring for the cluster

# ---------------------------------------------------------------------------
# OUTPUTS with EXPORT = values PUBLISHED account-wide so the separate per-service
# stacks can import them (that is how a service stack "plugs into" this platform).
# Each Export name must be unique across the account.
# ---------------------------------------------------------------------------
Outputs:
  VpcId:
    Value: !Ref Vpc
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'          # AWS::StackName = the name you gave this stack
  PrivateSubnetIds:
    Description: Private subnets where services run
    Value: !Join [',', [!Ref PrivateSubnetA, !Ref PrivateSubnetB]]  # !Join glues the two IDs with a comma
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnetIds'
  PublicSubnetIds:
    Value: !Join [',', [!Ref PublicSubnetA, !Ref PublicSubnetB]]
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnetIds'
  AlbDnsName:
    Description: Shared ALB DNS name - all service CNAMEs point here
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-AlbDnsName'
  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-AlbSecurityGroupId'
  RulesListenerArn:
    Description: Listener that service stacks attach host-based rules to (HTTPS when cert present, else HTTP)
    Value: !If [HasCertificate, !Ref HttpsListener, !Ref HttpListener]
    Export:
      Name: !Sub '${AWS::StackName}-RulesListenerArn'
  ClusterName:
    Value: !Ref Cluster
    Export:
      Name: !Sub '${AWS::StackName}-ClusterName'
